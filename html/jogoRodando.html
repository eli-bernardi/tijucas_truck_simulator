<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../assets/images/game/fav_game.png" type="image/x-icon">
    <link rel="stylesheet" href="../assets/css/jogoRodando.css">
    <script src="../models/Obj.js" defer></script>
    <script src="../models/Cenario.js" defer></script>
    <script src="../models/Caminhao.js" defer></script>
    <script src="../models/VeiculoInimigo.js" defer></script>
    <script src="../models/Coletavel.js" defer></script>
    <script src="../index.js" defer></script>
    <title>Tijucas Truck Simulator</title>
</head>

<body>
 
    <!-- MODAL DE SELEÇÃO DE MODO -->
    <div id="modal-modo" class="modal-overlay">
        <div class="modal-box">
            <h2>Tijucas Truck Simulator</h2>
            <p>Selecione o modo de jogo</p>
            <div class="modal-botoes">
                <button id="btn-solo" class="btn-modo">Solo</button>
                <button id="btn-multi" class="btn-modo">Multiplayer</button>
            </div>
            <div class="modal-controles">
                <span>J1: WASD</span>
                <span id="info-j2" style="display:none">J2: Setas</span>
            </div>
        </div>
    </div>

    <header>
        <nav>
            <ul>
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="./sobreGame.html">Sobre o Jogo</a></li>
                <li><a href="./manual.html">Manual</a></li>
            </ul>
        </nav>
    </header>

    <!-- HUD Jogador 1 -->
    <div class="game-header" id="hud-j1">
        <div class="stats">
            <span>J1 | 💰 <span id="dinheiro">R$ 1.500</span></span>
            <span>📦 <span id="carga">100%</span></span>
            <span>🎯 <span id="fase">1/3</span></span>
        </div>
        <div class="carga-info">
            <span id="cargaNome">Caixas de Madeira</span>
            <span id="cargaValor">R$ 1.000</span>
        </div>
    </div>
    <canvas id="des" width="1200" height="500"></canvas>

    <!-- HUD Jogador 2 (oculto no modo solo) -->
    <div class="game-header" id="hud-j2" style="display:none">
        <div class="stats">
            <span>J2 | 💰 <span id="dinheiro2">R$ 1.500</span></span>
            <span>📦 <span id="carga2">100%</span></span>
            <span>🎯 <span id="fase2">1/3</span></span>
        </div>
        <div class="carga-info">
            <span id="cargaNome2">Caixas de Madeira</span>
            <span id="cargaValor2">R$ 1.000</span>
        </div>
    </div>
    <canvas id="des2" width="1200" height="500" style="display:none"></canvas>

    <footer>
        <a href="https://github.com/eli-bernardi">Eliel Bernardi ©</a>
    </footer>
</body>

</html>
